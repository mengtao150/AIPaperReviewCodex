server:
  port: ${SERVER_PORT:8080}

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:aipaper_review}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      encoding: UTF-8

app:
  storage-dir: ${APP_STORAGE_DIR:uploads}
  ragflow:
    enabled: ${RAGFLOW_ENABLED:false}
    base-url: ${RAGFLOW_BASE_URL:http://localhost:9380}
    api-key: ${RAGFLOW_API_KEY:}
    dataset-ids: ${RAGFLOW_DATASET_IDS:}
    top-k: ${RAGFLOW_TOP_K:8}
    page-size: ${RAGFLOW_PAGE_SIZE:8}
    similarity-threshold: ${RAGFLOW_SIMILARITY_THRESHOLD:0.2}
    vector-similarity-weight: ${RAGFLOW_VECTOR_SIMILARITY_WEIGHT:0.3}
    timeout-seconds: ${RAGFLOW_TIMEOUT_SECONDS:30}
